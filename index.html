<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EEG 图像参考库 — BCI Research</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff;
    --accent-green: #3fb950; --accent-orange: #d2991d;
    --accent-red: #f85149; --accent-purple: #a371f7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }

  /* ── sidebar ── */
  .sidebar { width:260px; min-width:260px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:20px; overflow-y:auto; }
  .sidebar h1 { font-size:1.1rem; font-weight:600; margin-bottom:4px; letter-spacing:-0.3px; }
  .sidebar .subtitle { font-size:0.75rem; color:var(--text-dim); margin-bottom:20px; }
  .search-box { width:100%; padding:8px 12px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:0.85rem; margin-bottom:20px; outline:none; }
  .search-box:focus { border-color:var(--accent); } .search-box::placeholder { color:var(--text-dim); }
  .cat-group { margin-bottom:18px; }
  .cat-group-title { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-dim); margin-bottom:6px; padding-left:2px; }
  .cat-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:6px; cursor:pointer; font-size:0.88rem; transition:background 0.15s; border:none; background:none; color:var(--text); width:100%; text-align:left; }
  .cat-item:hover { background:rgba(255,255,255,0.04); } .cat-item.active { background:rgba(88,166,255,0.12); color:var(--accent); }
  .cat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .cat-count { margin-left:auto; font-size:0.75rem; color:var(--text-dim); }

  /* ── main ── */
  .main { flex:1; overflow:hidden; display:flex; flex-direction:column; }
  .tab-bar { display:flex; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .tab-btn { padding:12px 24px; border:none; background:none; color:var(--text-dim); font-size:0.88rem; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; font-family:inherit; }
  .tab-btn:hover { color:var(--text); } .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-content { display:none; flex:1; overflow:hidden; }
  .tab-content.active { display:flex; flex-direction:column; }

  /* ── gallery ── */
  .gallery-inner { padding:24px 32px; overflow-y:auto; flex:1; }
  .main-header { margin-bottom:20px; } .main-header h2 { font-size:1.25rem; font-weight:600; }
  .main-header .result-count { font-size:0.8rem; color:var(--text-dim); margin-top:2px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; cursor:pointer; transition:border-color 0.15s,transform 0.15s; }
  .card:hover { border-color:var(--accent); transform:translateY(-1px); }
  .card canvas { width:100%; height:160px; display:block; background:#0a0e14; }
  .card-body { padding:14px 16px; } .card-title { font-size:0.92rem; font-weight:600; margin-bottom:4px; }
  .card-desc { font-size:0.8rem; color:var(--text-dim); line-height:1.4; margin-bottom:8px; }
  .card-tags { display:flex; gap:6px; flex-wrap:wrap; }
  .tag { font-size:0.7rem; padding:2px 8px; border-radius:10px; font-weight:500; }
  .tag-delta{background:rgba(163,113,247,0.15);color:var(--accent-purple)}.tag-theta{background:rgba(88,166,255,0.15);color:var(--accent)}.tag-alpha{background:rgba(63,185,80,0.15);color:var(--accent-green)}.tag-beta{background:rgba(210,153,29,0.15);color:var(--accent-orange)}.tag-gamma{background:rgba(248,81,73,0.15);color:var(--accent-red)}.tag-bci{background:rgba(88,166,255,0.15);color:var(--accent)}.tag-artifact{background:rgba(248,81,73,0.15);color:var(--accent-red)}

  /* ── overlay ── */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .overlay.open { opacity:1; pointer-events:auto; }
  .overlay-content { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:28px; max-width:800px; width:90vw; max-height:85vh; overflow-y:auto; }
  .overlay-content canvas { width:100%; height:280px; border-radius:8px; background:#0a0e14; margin-bottom:18px; }
  .overlay-content h3 { font-size:1.3rem; margin-bottom:6px; } .overlay-content .overlay-freq { font-size:0.85rem; color:var(--accent); margin-bottom:12px; }
  .overlay-content .overlay-desc { font-size:0.9rem; color:var(--text-dim); line-height:1.6; margin-bottom:14px; }
  .overlay-content .overlay-bci { background:rgba(88,166,255,0.06); border-left:2px solid var(--accent); padding:12px 16px; border-radius:0 6px 6px 0; font-size:0.85rem; line-height:1.5; color:var(--text); }
  .overlay-close { position:absolute; top:16px; right:16px; width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .overlay-close:hover { background:var(--border); } .empty-state { text-align:center; padding:60px 20px; color:var(--text-dim); } .empty-state .icon { font-size:2.5rem; margin-bottom:12px; }

  /* ── simulator layout ── */
  .sim-layout { display:flex; flex:1; overflow:hidden; min-height:0; }
  .sim-left { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
  .sim-canvas-wrap { flex:1; overflow:hidden; padding:4px 8px; min-height:0; cursor:pointer; }
  .sim-canvas-wrap canvas { width:100%; height:100%; display:block; background:#080c12; border-radius:8px; }

  /* ── analysis panel ── */
  .analysis-panel {
    width:280px; min-width:280px; background:var(--surface);
    border-left:1px solid var(--border); overflow-y:auto;
    padding:12px; display:flex; flex-direction:column; gap:10px;
  }
  .panel-section { border:1px solid var(--border); border-radius:8px; padding:10px; }
  .panel-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-dim); margin-bottom:6px; }
  .panel-select { width:100%; padding:5px 8px; border-radius:5px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:0.8rem; outline:none; font-family:inherit; }
  .panel-select:focus { border-color:var(--accent); }
  .band-bar-wrap { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
  .band-bar-label { font-size:0.72rem; font-weight:600; width:14px; text-align:right; flex-shrink:0; }
  .band-bar-track { flex:1; height:8px; background:rgba(255,255,255,0.04); border-radius:4px; overflow:hidden; }
  .band-bar-fill { height:100%; border-radius:4px; transition:width 0.3s; }
  .band-bar-val { font-size:0.65rem; color:var(--text-dim); width:36px; text-align:right; flex-shrink:0; }
  .topo-canvas { width:100%; aspect-ratio:1; background:#080c12; border-radius:6px; display:block; }

  /* ── event buttons ── */
  .evt-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .evt-btn { padding:6px 8px; border-radius:5px; border:1px solid var(--border); background:var(--bg); color:var(--text); cursor:pointer; font-size:0.72rem; font-family:inherit; transition:all 0.12s; text-align:center; }
  .evt-btn:hover { border-color:var(--accent); background:rgba(88,166,255,0.08); }
  .evt-log { max-height:80px; overflow-y:auto; font-size:0.68rem; color:var(--text-dim); margin-top:4px; }
  .evt-log-entry { padding:2px 0; border-bottom:1px solid rgba(255,255,255,0.03); font-family:monospace; }

  /* ── record button ── */
  .rec-btn { width:100%; padding:8px; border-radius:6px; border:1px solid var(--accent-red); background:rgba(248,81,73,0.1); color:var(--accent-red); cursor:pointer; font-size:0.8rem; font-family:inherit; font-weight:600; transition:all 0.15s; }
  .rec-btn:hover { background:rgba(248,81,73,0.2); }
  .rec-btn.recording { animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .rec-time { font-size:0.7rem; color:var(--text-dim); text-align:center; margin-top:2px; }

  /* ── controls bar ── */
  .controls-bar { display:flex; align-items:center; gap:14px; padding:8px 20px; background:var(--surface); border-top:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
  .controls-bar label { font-size:0.72rem; color:var(--text-dim); white-space:nowrap; }
  .controls-bar select { padding:5px 10px; border-radius:5px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:0.82rem; outline:none; font-family:inherit; }
  .controls-bar select:focus { border-color:var(--accent); }
  .ctrl-group { display:flex; align-items:center; gap:6px; }
  .ctrl-slider { width:80px; accent-color:var(--accent); }
  .ctrl-btn { padding:5px 14px; border-radius:5px; border:1px solid var(--border); background:var(--bg); color:var(--text); cursor:pointer; font-size:0.8rem; font-family:inherit; transition:all 0.15s; }
  .ctrl-btn:hover { border-color:var(--accent); } .ctrl-btn.active-ctrl { background:var(--accent); color:#fff; border-color:var(--accent); }
  .ctrl-val { font-size:0.7rem; color:var(--text-dim); min-width:28px; text-align:right; }
</style>
</head>
<body>

<!-- ═══════════ SIDEBAR ═══════════ -->
<aside class="sidebar" id="sidebar">
  <h1>EEG 图像参考库</h1>
  <p class="subtitle">Brain-Computer Interface</p>
  <input class="search-box" id="search" placeholder="搜索..." autocomplete="off">
  <div class="cat-group">
    <div class="cat-group-title">正常节律</div>
    <button class="cat-item" data-cat="delta"><span class="cat-dot" style="background:var(--accent-purple)"></span>Delta δ<span class="cat-count" data-count="delta"></span></button>
    <button class="cat-item" data-cat="theta"><span class="cat-dot" style="background:var(--accent)"></span>Theta θ<span class="cat-count" data-count="theta"></span></button>
    <button class="cat-item" data-cat="alpha"><span class="cat-dot" style="background:var(--accent-green)"></span>Alpha α<span class="cat-count" data-count="alpha"></span></button>
    <button class="cat-item" data-cat="beta"><span class="cat-dot" style="background:var(--accent-orange)"></span>Beta β<span class="cat-count" data-count="beta"></span></button>
    <button class="cat-item" data-cat="gamma"><span class="cat-dot" style="background:var(--accent-red)"></span>Gamma γ<span class="cat-count" data-count="gamma"></span></button>
  </div>
  <div class="cat-group">
    <div class="cat-group-title">BCI 范式</div>
    <button class="cat-item" data-cat="bci"><span class="cat-dot" style="background:var(--accent)"></span>运动想象 ERD/ERS<span class="cat-count" data-count="bci"></span></button>
    <button class="cat-item" data-cat="bci"><span class="cat-dot" style="background:var(--accent-green)"></span>SSVEP<span class="cat-count" data-count="bci"></span></button>
    <button class="cat-item" data-cat="bci"><span class="cat-dot" style="background:var(--accent-orange)"></span>P300 / ERN<span class="cat-count" data-count="bci"></span></button>
    <button class="cat-item" data-cat="bci"><span class="cat-dot" style="background:var(--accent-purple)"></span>μ 节律 / SCP / 混合范式<span class="cat-count" data-count="bci"></span></button>
  </div>
  <div class="cat-group">
    <div class="cat-group-title">常见伪迹</div>
    <button class="cat-item" data-cat="artifact"><span class="cat-dot" style="background:var(--accent-red)"></span>眼电 / 肌电 / 噪声<span class="cat-count" data-count="artifact"></span></button>
  </div>
  <button class="cat-item active" data-cat="all" style="margin-top:8px; font-weight:500;">显示全部</button>
</aside>

<!-- ═══════════ MAIN ═══════════ -->
<div class="main" id="main">
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="gallery">图像参考库</button>
    <button class="tab-btn" data-tab="simulator">动态仿真平台</button>
  </div>
  <div class="tab-content active" id="tab-gallery">
    <div class="gallery-inner">
      <div class="main-header"><h2 id="mainTitle">全部图像</h2><p class="result-count" id="resultCount"></p></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>
  <div class="tab-content" id="tab-simulator">
    <div class="sim-layout">
      <div class="sim-left">
        <div class="sim-canvas-wrap" id="simCanvasWrap">
          <canvas id="simCanvas"></canvas>
        </div>
      </div>
      <div class="analysis-panel" id="analysisPanel">
        <!-- Channel selector -->
        <div class="panel-section">
          <div class="panel-label">分析通道</div>
          <select class="panel-select" id="chanSelect"></select>
        </div>
        <!-- FFT Spectrum -->
        <div class="panel-section">
          <div class="panel-label">实时频谱 (0–60 Hz)</div>
          <canvas id="spectrumCanvas" style="width:100%;height:130px;background:#080c12;border-radius:6px;"></canvas>
        </div>
        <!-- Band Powers -->
        <div class="panel-section">
          <div class="panel-label">频段功率</div>
          <div id="bandBars"></div>
        </div>
        <!-- Topographic Map -->
        <div class="panel-section">
          <div class="panel-label">脑地形图</div>
          <select class="panel-select" id="topoBand" style="margin-bottom:6px;">
            <option value="delta">Delta (0.5–4 Hz)</option>
            <option value="theta">Theta (4–8 Hz)</option>
            <option value="alpha" selected>Alpha (8–13 Hz)</option>
            <option value="beta">Beta (13–30 Hz)</option>
            <option value="gamma">Gamma (30–60 Hz)</option>
          </select>
          <canvas class="topo-canvas" id="topoCanvas"></canvas>
        </div>
        <!-- Event Injection -->
        <div class="panel-section">
          <div class="panel-label">事件注入</div>
          <div class="evt-grid">
            <button class="evt-btn" data-evt="stim">视觉刺激</button>
            <button class="evt-btn" data-evt="mi">运动想象</button>
            <button class="evt-btn" data-evt="blink">眨眼</button>
            <button class="evt-btn" data-evt="error">错误反应</button>
          </div>
          <div class="evt-log" id="evtLog"><span style="color:var(--text-dim)">暂无事件</span></div>
        </div>
        <!-- Recording -->
        <div class="panel-section">
          <div class="panel-label">数据录制</div>
          <button class="rec-btn" id="recBtn">🔴 开始录制</button>
          <div class="rec-time" id="recTime"></div>
        </div>
      </div>
    </div>
    <div class="controls-bar" id="controlsBar"></div>
  </div>
</div>

<!-- ═══════════ OVERLAY ═══════════ -->
<div class="overlay" id="overlay">
  <div class="overlay-content" id="overlayContent"></div>
  <button class="overlay-close" id="overlayClose">&times;</button>
</div>

<script>
var TAU=2*Math.PI;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// ═══════════════════════════════════════════ STATIC WAVEFORM RENDERER
function drawEEG(canvas,seed,params){
  var w=canvas.width=canvas.clientWidth*2||800,h=canvas.height=320,ctx=canvas.getContext('2d'),rng=mulberry32(seed);
  ctx.fillStyle='#0a0e14';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
  for(var y=0;y<h;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  for(var x=0;x<w;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  var samples=params.samples||600,data=new Float64Array(samples);
  if(params.type==='transient'){
    var ei=Math.floor(samples*params.eventPos),ew=params.eventWidth||40;
    for(var i=0;i<samples;i++){var t=i/samples,val=0;for(var k=0;k<params.bgComponents.length;k++){var bg=params.bgComponents[k];val+=bg.amp*Math.sin(TAU*bg.freq*t*params.duration+rng()*Math.PI);}var dist=Math.abs(i-ei)/ew;if(dist<2.5)val+=params.eventAmp*Math.exp(-dist*dist)*(params.eventSign||1);val+=(rng()-0.5)*2*(params.noise||0.015);data[i]=val;}
  }else if(params.type==='burst'){
    var bs=Math.floor(samples*0.3),be=Math.floor(samples*0.45);
    for(var i=0;i<samples;i++){var t=i/samples,val=0;for(var k=0;k<params.bgComponents.length;k++){var bg=params.bgComponents[k];val+=bg.amp*Math.sin(TAU*bg.freq*t*params.duration+rng()*Math.PI);}if(i>=bs&&i<=be){var env=Math.sin(Math.PI*(i-bs)/(be-bs));for(var k=0;k<params.burstComponents.length;k++){var bc=params.burstComponents[k];val+=bc.amp*env*Math.sin(TAU*bc.freq*t*params.duration+rng()*Math.PI);}}val+=(rng()-0.5)*2*(params.noise||0.01);data[i]=val;}
  }else if(params.type==='erds'){
    var ci=Math.floor(samples*0.25);
    for(var i=0;i<samples;i++){var t=i/samples,val=0,env=1;if(i>ci){var rt=(i-ci)/(samples-ci);env=1-0.6*Math.exp(-rt*3)+0.5*(1-Math.exp(-rt*5))*(rt>0.15?1:0);}for(var k=0;k<params.components.length;k++){var c=params.components[k];val+=c.amp*env*Math.sin(TAU*c.freq*t*params.duration+rng()*Math.PI);}val+=(rng()-0.5)*2*(params.noise||0.01);data[i]=val;}
  }else if(params.type==='ssvep'){
    for(var i=0;i<samples;i++){var t=i/samples,val=0;for(var k=0;k<params.components.length;k++){var c=params.components[k];val+=c.amp*Math.sin(TAU*c.freq*t*params.duration);}val+=(rng()-0.5)*2*(params.noise||0.01);data[i]=val;}
  }else if(params.type==='mu'){
    for(var i=0;i<samples;i++){var t=i/samples,val=0,mod=1;if(t>0.3&&t<0.7)mod=0.2;for(var k=0;k<params.components.length;k++){var c=params.components[k];val+=c.amp*mod*Math.sin(TAU*c.freq*t*params.duration+rng()*Math.PI);}val+=(rng()-0.5)*2*(params.noise||0.01);data[i]=val;}
  }else if(params.type==='scp'){
    for(var i=0;i<samples;i++){var t=i/samples,val=0,slow=0;if(t>0.25)slow=-0.55*(1-Math.exp(-(t-0.25)*3));for(var k=0;k<params.bgComponents.length;k++){var bg=params.bgComponents[k];val+=bg.amp*Math.sin(TAU*bg.freq*t*params.duration+rng()*Math.PI);}val+=slow;val+=(rng()-0.5)*2*(params.noise||0.01);data[i]=val;}
  }else if(params.type==='hybrid'){
    for(var i=0;i<samples;i++){var t=i/samples,val=0,env=1;if(t>0.3)env=0.3;for(var k=0;k<params.miComponents.length;k++){var c=params.miComponents[k];val+=c.amp*env*Math.sin(TAU*c.freq*t*params.duration+rng()*Math.PI);}for(var k=0;k<params.ssvepComponents.length;k++){var c=params.ssvepComponents[k];val+=c.amp*Math.sin(TAU*c.freq*t*params.duration);}val+=(rng()-0.5)*2*(params.noise||0.01);data[i]=val;}
  }else{
    for(var i=0;i<samples;i++){var t=i/samples,val=0;for(var k=0;k<params.components.length;k++){var c=params.components[k],mod=1+0.15*Math.sin(TAU*0.3*t*params.duration+k);val+=c.amp*mod*Math.sin(TAU*c.freq*t*params.duration+rng()*0.3*Math.PI);}val+=(rng()-0.5)*2*(params.noise||0.01);data[i]=val;}
  }
  ctx.strokeStyle=params.color||'#58a6ff';ctx.lineWidth=1.8;ctx.shadowColor=params.color||'#58a6ff';ctx.shadowBlur=4;ctx.beginPath();
  var yMid=h/2,xScale=w/samples,yScale=0.5*h;
  for(var i=0;i<samples;i++){var x=i*xScale,y=yMid-data[i]*yScale;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
  ctx.stroke();ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='10px monospace';ctx.fillText((params.duration||2)+'s',w-30,h-8);
}

// ═══════════════════════════════════════════ GALLERY DATASET

var activeCat='all',searchQuery='';
function renderGallery(){
  var filtered=eegData.filter(function(item){if(activeCat!=='all'&&item.cat!==activeCat)return false;if(searchQuery){var q=searchQuery.toLowerCase();return item.title.indexOf(q)!==-1||item.desc.indexOf(q)!==-1||item.freq.indexOf(q)!==-1;}return true;});
  document.getElementById('mainTitle').textContent=activeCat==='all'?'全部图像':({delta:'Delta 波 (δ)',theta:'Theta 波 (θ)',alpha:'Alpha 波 (α)',beta:'Beta 波 (β)',gamma:'Gamma 波 (γ)',bci:'BCI 范式',artifact:'常见伪迹'})[activeCat]||activeCat;
  document.getElementById('resultCount').textContent='共 '+filtered.length+' 张图像';
  var grid=document.getElementById('grid');
  if(!filtered.length){grid.innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>未找到匹配的图像</p></div>';return;}
  grid.innerHTML='';
  filtered.forEach(function(item){
    var card=document.createElement('div');card.className='card';card.onclick=function(){openDetail(item);};
    var cv=document.createElement('canvas');card.appendChild(cv);
    var body=document.createElement('div');body.className='card-body';
    body.innerHTML='<div class="card-title">'+item.title+'</div><div class="card-desc">'+item.desc+'</div><div class="card-tags"><span class="tag tag-'+item.tag+'">'+item.freq+'</span></div>';
    card.appendChild(body);grid.appendChild(card);
    requestAnimationFrame(function(){drawEEG(cv,item.title.split('').reduce(function(a,c){return a+c.charCodeAt(0)},0),item);});
  });
}
function updateCatCounts(){var counts={};eegData.forEach(function(item){counts[item.cat]=(counts[item.cat]||0)+1;});document.querySelectorAll('[data-count]').forEach(function(el){el.textContent=counts[el.dataset.count]||0;});}
function openDetail(item){var overlay=document.getElementById('overlay'),content=document.getElementById('overlayContent');content.innerHTML='<canvas id="detailCanvas"></canvas><h3>'+item.title+'</h3><div class="overlay-freq">'+item.freq+'</div><div class="overlay-desc">'+item.desc+'</div><div class="overlay-bci">'+item.bci.replace(/\*\*/g,'')+'</div>';overlay.classList.add('open');requestAnimationFrame(function(){var dc=document.getElementById('detailCanvas');dc.height=320;drawEEG(dc,item.title.split('').reduce(function(a,c){return a+c.charCodeAt(0)},0)+999,item);});}
function closeDetail(){document.getElementById('overlay').classList.remove('open');}

function getChannelWeights(chName,scenario){
  var ch=channels.find(function(c){return c.name===chName;}),sc=scenarios[scenario],base=sc.regions[ch.region],ov=(sc.channelOverrides||{})[chName],w={};
  ['delta','theta','alpha','beta','gamma'].forEach(function(b){w[b]=ov?ov[b]:base[b];});return w;
}

var bgComps=[
  {band:'delta',freqs:[0.8,1.5,2.5,3.5],baseAmps:[0.35,0.2,0.12,0.08]},
  {band:'theta',freqs:[5,6.5,7.5],baseAmps:[0.28,0.18,0.12]},
  {band:'alpha',freqs:[8.5,10,11.5],baseAmps:[0.3,0.22,0.15]},
  {band:'beta',freqs:[16,20,25],baseAmps:[0.15,0.1,0.06]},
  {band:'gamma',freqs:[40,55,70],baseAmps:[0.06,0.04,0.02]}
];

function generateSamples(chanIdx,count,dt,scenario,time0){
  var chName=channels[chanIdx].name,ch=channels[chanIdx],sc=scenarios[scenario],w=getChannelWeights(chName,scenario),bg=simState.bandGains,noiseAmp=simState.noise,samples=new Float64Array(count);
  if(!simState.phase[chanIdx])simState.phase[chanIdx]={};
  for(var i=0;i<count;i++){var t=time0+i*dt,val=0;
    for(var j=0;j<bgComps.length;j++){var band=bgComps[j],bandGain=w[band.band]*bg[band.band];for(var k=0;k<band.freqs.length;k++){var pk=band.band+'_'+k;if(!(pk in simState.phase[chanIdx]))simState.phase[chanIdx][pk]=Math.random()*TAU;val+=band.baseAmps[k]*bandGain*Math.sin(simState.phase[chanIdx][pk]+TAU*band.freqs[k]*t);}}
    if(sc.extras){for(var j=0;j<sc.extras.length;j++){var ex=sc.extras[j];if(ex.region!=='all'&&ex.region!==ch.region)continue;var exAmp=ex.amp;if(ex.burst){var bp=(t%ex.burstPeriod)/ex.burstPeriod,bev=bp<(ex.burstDur/ex.burstPeriod)?Math.sin(Math.PI*bp*(ex.burstPeriod/ex.burstDur)):0;exAmp*=bev;}if(ex.spike){var sp=(t*ex.freq)%1;if(sp<0.08)exAmp*=Math.exp(-sp*30);else if(sp<0.5)exAmp*=-0.3*Math.sin(Math.PI*(sp-0.08)/0.42);else exAmp*=0;}if(ex.noiseBurst){var nev=0.5+0.5*Math.sin(t*1.7)*Math.sin(t*2.3);exAmp*=Math.max(0,nev);}var ek='ex_'+j;if(!(ek in simState.phase[chanIdx]))simState.phase[chanIdx][ek]=Math.random()*TAU;val+=exAmp*Math.sin(simState.phase[chanIdx][ek]+TAU*ex.freq*t);}}
    val+=(Math.random()-0.5)*2*noiseAmp;samples[i]=val;
  }return samples;
}

// ═══════════════════════════════════════════ ANALYSIS FUNCTIONS

// DFT spectrum: 128 bins from 0.5 to 60 Hz
var FFT_BINS=128,FFT_WINDOW=256;
var specBuf=new Float64Array(FFT_BINS); // shared buffer for spectrum magnitudes
var bandPowers={delta:0,theta:0,alpha:0,beta:0,gamma:0};

function computeSpectrum(chanIdx){
  var buf=simState.buffers[chanIdx],wp=simState.writePos[chanIdx],n=FFT_WINDOW;
  // Extract window of samples
  var win=new Float64Array(n);
  for(var i=0;i<n;i++){var idx=(wp-n+i+BUFSIZE)%BUFSIZE;win[i]=buf[idx];}
  // Hamming window
  for(var i=0;i<n;i++){win[i]*=0.54-0.46*Math.cos(TAU*i/(n-1));}
  // DFT at 128 frequencies from 0.5 to 60 Hz
  var fftMin=0.5,fftMax=60;
  for(var b=0;b<FFT_BINS;b++){
    var f=fftMin+(fftMax-fftMin)*b/(FFT_BINS-1),real=0,imag=0;
    for(var i=0;i<n;i++){var phi=TAU*f*i/SAMPLE_RATE;real+=win[i]*Math.cos(phi);imag+=win[i]*Math.sin(phi);}
    specBuf[b]=Math.sqrt(real*real+imag*imag)/n;
  }
  // Compute band powers from DFT
  var bands={delta:[0.5,4],theta:[4,8],alpha:[8,13],beta:[13,30],gamma:[30,60]};
  ['delta','theta','alpha','beta','gamma'].forEach(function(bn){
    var r=bands[bn],sum=0,cnt=0;
    for(var b=0;b<FFT_BINS;b++){var f=fftMin+(fftMax-fftMin)*b/(FFT_BINS-1);if(f>=r[0]&&f<=r[1]){sum+=specBuf[b]*specBuf[b];cnt++;}}
    bandPowers[bn]=cnt>0?sum/cnt:0;
  });
}

// Compute band power for one channel in a specific band (for topo)
function getBandPower(chanIdx,bandName){
  var buf=simState.buffers[chanIdx],wp=simState.writePos[chanIdx],n=FFT_WINDOW;
  var win=new Float64Array(n);
  for(var i=0;i<n;i++){var idx=(wp-n+i+BUFSIZE)%BUFSIZE;win[i]=buf[idx];}
  var bands={delta:[0.5,4],theta:[4,8],alpha:[8,13],beta:[13,30],gamma:[30,60]},r=bands[bandName];
  // Use Goertzel-like for just this band
  var sum=0,cnt=0,step=(r[1]-r[0])/24;
  for(var f=r[0];f<=r[1];f+=step){var real=0,imag=0;for(var i=0;i<n;i++){var phi=TAU*f*i/SAMPLE_RATE;real+=win[i]*Math.cos(phi);imag+=win[i]*Math.sin(phi);}sum+=real*real+imag*imag;cnt++;}return cnt>0?Math.sqrt(sum/cnt)/n:0;
}

// Topographic map — electrode positions (10-20 2D projection)
var topoPos=[
  {x:-0.3,y:-0.72},{x:0.3,y:-0.72},
  {x:-0.52,y:-0.38},{x:0.52,y:-0.38},
  {x:-0.62,y:0},{x:0.62,y:0},
  {x:-0.38,y:0.52},{x:0.38,y:0.52}
];
function idw(x,y,vals){var sum=0,wSum=0;for(var i=0;i<topoPos.length;i++){var dx=x-topoPos[i].x,dy=y-topoPos[i].y,d2=dx*dx+dy*dy;if(d2<0.0001)d2=0.0001;var w=1/d2;sum+=vals[i]*w;wSum+=w;}return wSum>0?sum/wSum:0;}
function valToColor(v,min,max){
  if(max-min<1e-9)return [0,128,255];
  var t=(v-min)/(max-min);t=t<0?0:t>1?1:t;
  // blue -> cyan -> green -> yellow -> red
  var r,g,b;
  if(t<0.25){var s=t/0.25;r=0;g=Math.floor(128*s);b=Math.floor(255-127*s);}
  else if(t<0.5){var s=(t-0.25)/0.25;r=0;g=Math.floor(128+127*s);b=Math.floor(128-128*s);}
  else if(t<0.75){var s=(t-0.5)/0.25;r=Math.floor(255*s);g=Math.floor(255-128*s);b=0;}
  else{var s=(t-0.75)/0.25;r=255;g=Math.floor(127-127*s);b=0;}
  return [r,g,b];
}
function drawTopoMap(){var canvas=document.getElementById('topoCanvas'),w=canvas.width=200,h=canvas.height=200,ctx=canvas.getContext('2d'),cx=w/2,cy=h/2,r=85,band=document.getElementById('topoBand').value;var vals=[];for(var i=0;i<channels.length;i++){vals.push(getBandPower(i,band));}var min=vals[0],max=vals[0];for(var i=1;i<vals.length;i++){if(vals[i]<min)min=vals[i];if(vals[i]>max)max=vals[i];}if(max<1e-9)max=1;var img=ctx.createImageData(w,h);for(var py=0;py<h;py++){for(var px=0;px<w;px++){var dx=(px-cx)/r,dy=(py-cy)/r;if(dx*dx+dy*dy>1){var idx=(py*w+px)*4;img.data[idx+3]=0;continue;}var v=idw(dx,dy,vals),col=valToColor(v,min,max),idx=(py*w+px)*4;img.data[idx]=col[0];img.data[idx+1]=col[1];img.data[idx+2]=col[2];img.data[idx+3]=255;}}ctx.putImageData(img,0,0);// Head outline + nose
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,r,0,TAU);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-r-2);ctx.lineTo(cx+6,cy-r-14);ctx.lineTo(cx-6,cy-r-14);ctx.closePath();ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fill();
  // Electrode dots
  for(var i=0;i<topoPos.length;i++){var ex=cx+topoPos[i].x*r,ey=cy+topoPos[i].y*r;ctx.fillStyle=channels[i].color;ctx.beginPath();ctx.arc(ex,ey,3,0,TAU);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex,ey,1.2,0,TAU);ctx.fill();}
  // Label
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText(band.toUpperCase(),cx,cy+r+16);
}

// Spectrum canvas draw
function drawSpectrum(){
  var canvas=document.getElementById('spectrumCanvas'),w=canvas.width=256,h=canvas.height=130,ctx=canvas.getContext('2d');
  ctx.fillStyle='#080c12';ctx.fillRect(0,0,w,h);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  for(var y=0;y<h;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  // Band shading
  var bands=[{n:'delta',s:0.5,e:4,c:'rgba(163,113,247,0.08)'},{n:'theta',s:4,e:8,c:'rgba(88,166,255,0.08)'},{n:'alpha',s:8,e:13,c:'rgba(63,185,80,0.08)'},{n:'beta',s:13,e:30,c:'rgba(210,153,29,0.08)'},{n:'gamma',s:30,e:60,c:'rgba(248,81,73,0.08)'}];
  for(var j=0;j<bands.length;j++){var b=bands[j],x0=bands[j].s/60*w,x1=bands[j].e/60*w;ctx.fillStyle=b.c;ctx.fillRect(x0,0,x1-x0,h);}
  // Spectrum line
  if(specBuf[0]===0&&specBuf[1]===0)return; // no data yet
  var maxV=0;for(var i=0;i<FFT_BINS;i++){if(specBuf[i]>maxV)maxV=specBuf[i];}if(maxV<1e-9)return;
  var dbFloor=-40;
  ctx.strokeStyle='#58a6ff';ctx.lineWidth=1.6;ctx.shadowColor='#58a6ff';ctx.shadowBlur=3;ctx.beginPath();
  for(var i=0;i<FFT_BINS;i++){var db=20*Math.log10(specBuf[i]/maxV),ny=h-(db-dbFloor)/(-dbFloor)*h;if(ny<0)ny=0;if(ny>h)ny=h;var sx=i/(FFT_BINS-1)*w;if(i===0)ctx.moveTo(sx,ny);else ctx.lineTo(sx,ny);}
  ctx.stroke();ctx.shadowBlur=0;
  // Labels
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='9px monospace';
  [0,10,20,30,40,50,60].forEach(function(f){ctx.fillText(f+'Hz',f/60*w-8,h-4);});
}

// Band power bars
function updateBandBars(){
  var container=document.getElementById('bandBars'),bands=['delta','theta','alpha','beta','gamma'],colors=['#a371f7','#58a6ff','#3fb950','#d2991d','#f85149'],labels=['δ','θ','α','β','γ'];
  var total=bandPowers.delta+bandPowers.theta+bandPowers.alpha+bandPowers.beta+bandPowers.gamma;
  if(total===0)total=1;
  var h='';
  for(var i=0;i<bands.length;i++){var pct=Math.round(bandPowers[bands[i]]/total*100),w=Math.min(100,Math.round(pct*1.5));h+='<div class="band-bar-wrap"><span class="band-bar-label" style="color:'+colors[i]+'">'+labels[i]+'</span><div class="band-bar-track"><div class="band-bar-fill" style="width:'+w+'%;background:'+colors[i]+'"></div></div><span class="band-bar-val">'+pct+'%</span></div>';}
  container.innerHTML=h;
}

// ═══════════════════════════════════════════ EVENT INJECTION
function injectEvent(type){
  var t=simState.time,label='';
  // Inject transient into last ~20 samples of relevant channels
  var nSamp=Math.floor(0.3*SAMPLE_RATE); // 300ms worth
  var affectedChans=[];
  switch(type){
    case'stim':label='视觉刺激';affectedChans=[6,7];break; // O1,O2
    case'mi':label='运动想象';affectedChans=[4,5];break; // C3,C4
    case'blink':label='眨眼';affectedChans=[0,1];break; // Fp1,Fp2
    case'error':label='错误反应';affectedChans=[2,3,4,5];break; // F3,F4,C3,C4
  }
  var amp=(type==='blink'?0.9:type==='error'?-0.45:0.4);
  for(var c=0;c<affectedChans.length;c++){
    var ci=affectedChans[c],buf=simState.buffers[ci],wp=simState.writePos[ci];
    for(var i=0;i<nSamp;i++){var idx=(wp-nSamp+i+BUFSIZE)%BUFSIZE,env=Math.exp(-Math.pow((i-nSamp*0.15)/(nSamp*0.2),2));buf[idx]+=amp*env*(type==='error'?1:1);}
  }
  simState.events.push({time:t,type:type,label:label});
  if(simState.events.length>50)simState.events.shift();
  updateEventLog();
}

function updateEventLog(){
  var log=document.getElementById('evtLog'),events=simState.events;
  if(!events.length){log.innerHTML='<span style="color:var(--text-dim)">暂无事件</span>';return;}
  var h='';
  for(var i=Math.max(0,events.length-8);i<events.length;i++){var e=events[i];h+='<div class="evt-log-entry">T+'+e.time.toFixed(2)+'s <span style="color:var(--accent)">'+e.label+'</span></div>';}
  log.innerHTML=h;log.scrollTop=log.scrollHeight;
}

// ═══════════════════════════════════════════ RECORDING
var recSamples=0,MAX_REC=60*SAMPLE_RATE;

function toggleRecording(){
  if(simState.recording){stopRecording();}else{startRecording();}
}
function startRecording(){
  simState.recording=true;simState.recBuf=[];simState.recStartTime=simState.time;recSamples=0;
  for(var c=0;c<channels.length;c++)simState.recBuf.push([]);
  var btn=document.getElementById('recBtn');btn.textContent='⏹ 停止录制';btn.classList.add('recording');
}
function stopRecording(){
  simState.recording=false;
  var btn=document.getElementById('recBtn');btn.textContent='🔴 开始录制';btn.classList.remove('recording');
  document.getElementById('recTime').textContent='';
  exportCSV();
}
function updateRecTime(){
  if(!simState.recording)return;
  var elapsed=simState.time-simState.recStartTime;
  document.getElementById('recTime').textContent='录制中: '+elapsed.toFixed(1)+'s / 60s';
  if(elapsed>=60)stopRecording();
}
function exportCSV(){
  var bufs=simState.recBuf;if(!bufs||!bufs[0]||!bufs[0].length)return;
  var rows=[],n=bufs[0].length;rows.push('timestamp,Fp1,Fp2,F3,F4,C3,C4,O1,O2');
  var dt=1/SAMPLE_RATE;
  for(var i=0;i<n;i++){var row=[(i*dt).toFixed(3)];for(var c=0;c<channels.length;c++){row.push(bufs[c][i]!==undefined?bufs[c][i].toFixed(6):'0');}rows.push(row.join(','));}
  var blob=new Blob([rows.join('\n')],{type:'text/csv'}),url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='eeg_recording_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

  var chH=(rect.height-4)/channels.length,clickedCh=Math.floor((y-2)/chH);

// ═══════════════════════════════════════════ SIM RENDER LOOP
var simCanvas=document.getElementById('simCanvas'),simCtx=simCanvas.getContext('2d'),lastFrameTime=0,simAnimId=null;

function simResize(){
  var wrap=simCanvas.parentElement,rect=wrap.getBoundingClientRect();
  simCanvas.width=rect.width*2;simCanvas.height=rect.height*2;
}

function simTick(timestamp){
  if(!simState.running){simAnimId=requestAnimationFrame(simTick);return;}
  if(!lastFrameTime)lastFrameTime=timestamp;
  var elapsed=(timestamp-lastFrameTime)/1000;
  if(elapsed<1/(SIM_FPS+8)){simAnimId=requestAnimationFrame(simTick);return;}
  lastFrameTime=timestamp;simState.frameCount++;

  var dt=1/SAMPLE_RATE,genCount=Math.round(SAMPLE_RATE*elapsed*simState.speed);
  if(genCount<1)genCount=1;if(genCount>15)genCount=15;

  // Generate samples
  for(var c=0;c<channels.length;c++){
    var block=generateSamples(c,genCount,dt,simState.scenario,simState.time),buf=simState.buffers[c],wp=simState.writePos[c];
    for(var i=0;i<block.length;i++){buf[(wp+i)%BUFSIZE]=block[i];}
    simState.writePos[c]=(wp+block.length)%BUFSIZE;
    // Recording
    if(simState.recording){for(var i=0;i<block.length;i++){simState.recBuf[c].push(block[i]);if(simState.recBuf[c].length>MAX_REC)simState.recBuf[c].shift();}}
  }
  simState.time+=genCount*dt;
  updateRecTime();

  // ── Render waveform display ──
  simResize();
  var cw=simCanvas.width,ch=simCanvas.height,ctx=simCtx;
  ctx.fillStyle='#080c12';ctx.fillRect(0,0,cw,ch);
  var nCh=channels.length,labelW=60,plotX=labelW,plotW=cw-plotX-8,chH=(ch-4)/nCh;
  var visibleSamples=Math.floor(plotW*0.8);if(visibleSamples<100)visibleSamples=100;if(visibleSamples>BUFSIZE-10)visibleSamples=BUFSIZE-10;

  for(var c=0;c<nCh;c++){
    var y0=2+c*chH,yMid=y0+chH/2,buf=simState.buffers[c],wp=simState.writePos[c],chObj=channels[c];
    // Selection highlight
    if(c===simState.selectedChan){ctx.fillStyle='rgba(88,166,255,0.06)';ctx.fillRect(plotX,y0,plotW,chH);}
    else{ctx.fillStyle=c%2===0?'rgba(255,255,255,0.01)':'rgba(0,0,0,0.1)';ctx.fillRect(plotX,y0,plotW,chH);}
    // Grid
    ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(plotX,yMid);ctx.lineTo(plotX+plotW,yMid);ctx.stroke();
    var yScale=chH*0.35*simState.gain;
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.beginPath();ctx.moveTo(plotX-4,yMid-yScale);ctx.lineTo(plotX,yMid-yScale);ctx.stroke();ctx.beginPath();ctx.moveTo(plotX-4,yMid+yScale);ctx.lineTo(plotX,yMid+yScale);ctx.stroke();
    // Label
    ctx.fillStyle=chObj.color;ctx.font='bold 13px monospace';ctx.textAlign='right';ctx.fillText(chObj.name,plotX-8,yMid+4);
    // Waveform
    ctx.strokeStyle=chObj.color;ctx.lineWidth=1.4;ctx.shadowColor=chObj.color;ctx.shadowBlur=2;ctx.beginPath();
    var drawn=false;
    for(var i=0;i<visibleSamples;i++){var idx=(wp-visibleSamples+i+BUFSIZE)%BUFSIZE;if(idx<0)idx+=BUFSIZE;var sx=plotX+(i/visibleSamples)*plotW,sy=yMid-buf[idx]*yScale*simState.gain;if(!drawn){ctx.moveTo(sx,sy);drawn=true;}else ctx.lineTo(sx,sy);}
    ctx.stroke();ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(plotX,y0+chH);ctx.lineTo(plotX+plotW,y0+chH);ctx.stroke();
  }

  // Event markers
  var now=simState.time,visDur=visibleSamples/SAMPLE_RATE;
  for(var e=0;e<simState.events.length;e++){var ev=simState.events[e];if(now-ev.time>visDur)continue;var ex=plotX+plotW*(1-(now-ev.time)/visDur);ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,6]);ctx.beginPath();ctx.moveTo(ex,2);ctx.lineTo(ex,ch-4);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='9px monospace';ctx.fillText(ev.label,ex+4,14);}

  // Time
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='10px monospace';ctx.textAlign='right';ctx.fillText('T+'+simState.time.toFixed(1)+'s',cw-12,14);

  // ── Analysis updates (decoupled) ──
  if(simState.frameCount%6===0){computeSpectrum(simState.selectedChan);drawSpectrum();updateBandBars();}
  if(simState.frameCount%12===0){drawTopoMap();}

  simAnimId=requestAnimationFrame(simTick);
}

function simStart(){simState.running=true;lastFrameTime=0;if(!simAnimId)simAnimId=requestAnimationFrame(simTick);}
function simStop(){simState.running=false;}
function simToggle(){if(simState.running)simStop();else simStart();updateSimControls();}

function bindControlEvents(){
  document.getElementById('scenarioSelect').addEventListener('change',function(){simState.scenario=this.value;simState.phase=[];channels.forEach(function(){simState.phase.push({});});simState.events=[];updateEventLog();});
  ['delta','theta','alpha','beta','gamma'].forEach(function(b){document.getElementById('band-'+b).addEventListener('input',function(){simState.bandGains[b]=parseFloat(this.value);document.getElementById('val-'+b).textContent=this.value;});});
  document.getElementById('noiseSlider').addEventListener('input',function(){simState.noise=parseFloat(this.value);document.getElementById('val-noise').textContent=this.value;});
  document.getElementById('gainSlider').addEventListener('input',function(){simState.gain=parseFloat(this.value);document.getElementById('val-gain').textContent=parseFloat(this.value).toFixed(1);});
  document.querySelectorAll('[data-speed]').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('[data-speed]').forEach(function(b){b.classList.remove('active-ctrl');});this.classList.add('active-ctrl');simState.speed=parseFloat(this.dataset.speed);});});
  document.getElementById('btnPause').addEventListener('click',function(){simToggle();updateSimControls();});
  document.getElementById('btnReset').addEventListener('click',function(){simState.phase=[];simState.time=0;simState.events=[];updateEventLog();channels.forEach(function(){simState.phase.push({});});for(var c=0;c<channels.length;c++){simState.buffers[c].fill(0);simState.writePos[c]=0;}});
  // Channel select
  document.getElementById('chanSelect').addEventListener('change',function(){simState.selectedChan=parseInt(this.value);});
  // Event buttons
  document.querySelectorAll('.evt-btn').forEach(function(btn){btn.addEventListener('click',function(){injectEvent(this.dataset.evt);});});
  // Record button
  document.getElementById('recBtn').addEventListener('click',toggleRecording);
  // Topo band
  document.getElementById('topoBand').addEventListener('change',drawTopoMap);
  // Canvas click for channel selection
  document.getElementById('simCanvas').addEventListener('click',handleSimClick);
}

// ═══════════════════════════════════════════ TAB SWITCHING
function switchTab(tabName){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  document.querySelector('[data-tab="'+tabName+'"]').classList.add('active');
  document.getElementById('tab-'+tabName).classList.add('active');
  if(tabName==='simulator'){document.getElementById('sidebar').style.display='none';simResize();if(!simAnimId){lastFrameTime=0;simAnimId=requestAnimationFrame(simTick);}}
  else{document.getElementById('sidebar').style.display='';}
}

// ═══════════════════════════════════════════ INIT
updateCatCounts();renderGallery();buildControls();
document.querySelectorAll('.tab-btn').forEach(function(btn){btn.addEventListener('click',function(){switchTab(this.dataset.tab);});});
document.querySelectorAll('.sidebar .cat-item').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('.sidebar .cat-item').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');activeCat=btn.dataset.cat;renderGallery();});});
document.getElementById('search').addEventListener('input',function(e){searchQuery=e.target.value;renderGallery();});
document.getElementById('overlayClose').addEventListener('click',closeDetail);
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeDetail();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDetail();});
</script>
